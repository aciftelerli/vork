                excerpt: "Menü tasarımı sanat değil, matematik. Food cost, psikoloji ve strateji birleşince ortaya kârlı bir menü çıkar. İşte adım adım menü mühendisliği...",
                body: `
                    <h3>Menü Sadece Bir Liste Değil</h3>
                    <p>Çoğu restoran sahibi menüyü sadece ürün listesi olarak görür. Oysa menü, işletmenizin en güçlü pazarlama aracıdır. Doğru tasarlanmış bir menü, karlılığınızı %30-40 artırabilir.</p>
                    
                    <h3>1. Menu Matrix: Ürünlerinizi Kategorize Edin</h3>
                    <p>Her ürününüzü 4 kategoriden birine yerleştirin:</p>
                    <ul>
                        <li><strong>Stars (Yıldızlar):</strong> Hem çok satan hem karlı ürünler</li>
                        <li><strong>Plowhorses (Beygirler):</strong> Çok satar ama kârı düşük</li>
                        <li><strong>Puzzles (Bulmacalar):</strong> Az satar ama karlı</li>
                        <li><strong>Dogs (Kayıplar):</strong> Ne satar ne karlı - bunları menüden çıkarın</li>
                    </ul>
                    
                    <h3>2. Anchor Pricing Stratejisi</h3>
                    <p>Menünüzün en başına çok pahalı bir ürün koyun. Bu ürün satmayacak ama diğer ürünleri ucuz gösterecek. Müşteri algısı böyle çalışır.</p>
                    
                    <h3>3. Prime Space Optimizasyonu</h3>
                    <p>İnsan gözü menüde önce sağ üst köşeye bakar. En karlı ürününüzü oraya yerleştirin. Sonra sol üst, sonra sağ alt.</p>
                    
                    <h3>4. Fiyat Psikolojisi</h3>
                    <p>₺ işareti kullanmayın. "150₺" yerine sadece "150" yazın. Para sembolü harcama acısını artırır. Ayrıca 99,90 gibi fiyatlar fast-food'a özgüdür - siz yuvarlak rakam kullanın.</p>
                    
                    <h3>5. Descriptive Naming</h3>
                    <p>Ürün isimlerini uzatın. "Burger" yerine "Anne usulü ağır ateşte pişmiş angus burger" yazın. Uzun isimler %27 daha fazla satış getirir.</p>
                    
                    <p><strong>Sonuç:</strong> Menü tasarımı bir kez yaptığınız ve unuttuğunuz bir iş değil. 3 ayda bir gözden geçirin, test edin, optimize edin.</p>

                body: `
                    <h3>GTM Nedir ve Neden Önemli?</h3>
                    <p>Go-to-Market (GTM) stratejisi, harika ürününüzü doğru müşterilere, doğru zamanda, doğru kanallardan ulaştırma planıdır. Ürün yapmak kolay, satmak zor.</p>
                    
                    <h3>1. ICP (Ideal Customer Profile) Tanımlayın</h3>
                    <p>Herkes sizin müşteriniz değildir. İlk 100 müşteriniz kim olacak? Detaylı tanımlayın:</p>
                    <ul>
                        <li>Sektör, şirket büyüklüğü</li>
                        <li>Demografik özellikler</li>
                        <li>Acı noktaları (pain points)</li>
                        <li>Satın alma gücü</li>
                    </ul>
                    
                    <h3>2. Kanal Seçimi: Hepsinde Olmayın</h3>
                    <p>B2B startup → LinkedIn + Email + Events<br>
                    B2C consumer app → Instagram + TikTok + Influencer<br>
                    SaaS → Google Ads + Content Marketing + Product Hunt</p>
                    
                    <p>3 kanalda %100 olmak, 10 kanalda %30 olmaktan iyidir.</p>
                    
                    <h3>3. Messaging Framework</h3>
                    <p>Müşteriye "ne" yaptığınızı değil, "onun için ne" yaptığınızı anlatın.<br>
                    Kötü: "AI destekli CRM yazılımı"<br>
                    İyi: "Satış ekibiniz ayda 200 saat kazansın"</p>
                    
                    <h3>4. Launch Roadmap</h3>
                    <p>T-30: Teaser kampanya, waitlist<br>
                    T-14: Beta kullanıcılar, testimonials<br>
                    T-7: Press outreach, influencer seeds<br>
                    T-0: Launch (Product Hunt, sosyal medya push)<br>
                    T+7: Optimize, feedback loop</p>

                    <ul>
                        <li>CAC (Customer Acquisition Cost)</li>
                        <li>LTV (Lifetime Value)</li>
                        <li>Conversion rate (visitor → signup → paying)</li>
                        <li>Churn rate</li>

                    <p><strong>Sonuç:</strong> GTM stratejisi olmadan launch yapmak, haritasız okyanusta yüzmek gibi. Plan yapın, test edin, pivot edin.</p>

                    <h3>Dijital Reklam Yaktığınızı Nasıl Anlarsınız?</h3>

                    <p><strong>Yanlış:</strong> "İzmir'deki 18-65 yaş herkes"<br>
                    <strong>Doğru:</strong> "İzmir Alsancak/Karşıyaka, 25-45 yaş, foodie interest, gelir üst segment"</p>

                    <h3>HATA 2: Yanlış Kampanya Hedefi</h3>
                    <p><strong>Yanlış:</strong> Reach (erişim) kampanyası<br>
                    <strong>Doğru:</strong> Traffic → Website veya Conversions → Rezervasyon</p>

                    <h3>Food Cost Nedir ve Neden Önemli?</h3>

                    <p>Örnek: Bir tabak pasta satıyorsunuz, fiyatı 120₺. Malzeme maliyeti 40₺.<br>
                    Food cost = 40/120 = %33</p>
                    
                    <p><strong>İdeal food cost:</strong> %28-32 (fast casual)<br>
                    <strong>Fine dining:</strong> %25-28<br>
                    <strong>Tehlikeli bölge:</strong> %40+</p>
                    
                    <h3>1. Portion Control (Porsiyon Kontrolü)</h3>
                    <p>En büyük kaçak buradan olur. Her şef farklı porsiyon koyar.</p>

                        <li>Ölçekli kepçe/kaşık kullanımı</li>
                        <li>Her ürün için gram/adet belirtmek</li>
                    </ul>
                    
                    <p>10 gramlık sapma ayda binlerce TL kayıp demektir.</p>
                    
                    <h3>2. FIFO (First In, First Out)</h3>
                    <p>İlk giren ilk çıkar. Eski malzemeleri önce kullan.</p>
                    
                    <p>Depoda yeni siparişler önde durursa, arkadaki eskiler bozulur. Bozulan malzeme = çöpe giden para.</p>
                    
                    <h3>3. Daily/Weekly Inventory</h3>
                    <p>Her gün kısa envanter, her hafta detaylı envanter. Ne var, ne bitti, ne bozuldu?</p>
                    
                    <p>Excel bile yeter. Yazın, takip edin, analiz edin.</p>
                    
                    <h3>4. Menü Engineering ile Atık Azaltma</h3>
                    <p>Bir malzemeyi 3 farklı tabakta kullanırsanız, atık azalır.</p>
                    
                    <p>Örnek: Domates hem salata, hem sos, hem garnish. Tek seferlik kullanım = yüksek fire riski.</p>
                    
                    <h3>5. Staff Yemeği Hesaba Katın</h3>
                    <p>Personel yemeği maliyetinin %3-5'idir. Ama kontrol etmezseniz %10'a çıkar.</p>
                    
                    <p>Çözüm: Personel menüsü belirleyin, o günkü fazla/fire ürünlerle hazırlayın.</p>
                    
                    <h3>6. Tedarikçi İlişkisi</h3>
                    <p>Tek tedarikçiye bağımlı olmayın. En az 2-3 tedarikçi karşılaştırın.</p>
                    
                    <p>%5 daha ucuz mal bulmanız, aylık binlerce TL tasarruf demek.</p>
                    
                    <h3>7. Teknoloji Kullanın</h3>
                    <ul>
                        <li>Inventory management software</li>
                        <li>Recipe costing tools</li>
                        <li>POS entegrasyonu</li>
                    </ul>
                    
                    <h3>Gerçek Örnek: İzmir'de Bir Bistro</h3>
                    <p>Başlangıç food cost: %42 (tehlikeli)<br>
                    Aksiyonlar: Portion control + FIFO + Menü sadeleştirme<br>
                    6 ay sonra: %29<br>
                    Aylık tasarruf: 18.000₺</p>
                    
                    <p><strong>Sonuç:</strong> Food cost kontrolü sıkıcı ama hayati. Kontrol etmezseniz, sessizce batar gidersiniz.</p>

        // Render posts
        function renderPosts(filteredPosts = posts) {
            const grid = document.getElementById('postsGrid');
            grid.innerHTML = '';
            
            filteredPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.onclick = () => openModal(post.id);
                
                card.innerHTML = `
                    <span class="post-category">${post.category}</span>
                    <h2>${post.title}</h2>
                    <div class="post-meta">${post.date} • ${post.author}</div>
                    <p class="post-excerpt">${post.excerpt}</p>
                    <a href="#" class="read-more" onclick="event.preventDefault(); openModal(${post.id})">DEVAMINI OKU</a>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // Search functionality
        function searchPosts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = posts.filter(post => 
                post.title.toLowerCase().includes(searchTerm) ||
                post.excerpt.toLowerCase().includes(searchTerm) ||
                post.category.toLowerCase().includes(searchTerm)
            );
            renderPosts(filtered);
        }
        
        // Enter key search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPosts();
            }
        });
        
        // Modal functions
        function openModal(postId) {
            const post = posts.find(p => p.id === postId);
            const modal = document.getElementById('postModal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <span class="post-category">${post.category}</span>
                <h2>${post.title}</h2>
                <div class="post-meta">${post.date} • ${post.author}</div>
                <div class="post-body">${post.body}</div>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            const modal = document.getElementById('postModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // Close modal on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        // Close modal on background click
        document.getElementById('postModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Initial render
        renderPosts();
    </script>
